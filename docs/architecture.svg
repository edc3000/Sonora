<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1120" viewBox="0 0 1680 1120" role="img" aria-labelledby="title desc">
  <title id="title">Sonora AI Radio Architecture</title>
  <desc id="desc">Architecture diagram for the Sonora AI Radio Node.js PWA project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#111624"/>
      <stop offset="1" stop-color="#071c1c"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#273c75"/>
      <stop offset="1" stop-color="#1e6f5c"/>
    </linearGradient>
    <linearGradient id="server" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27596b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fb7c7"/>
    </marker>
    <marker id="arrowHot" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f7c46c"/>
    </marker>
    <style>
      .page { fill: url(#bg); }
      .title { font: 800 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f7fafc; letter-spacing: 0; }
      .subtitle { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b8c5cf; }
      .layer-title { font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #eaf2f6; letter-spacing: 0; }
      .box-title { font: 800 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .box-sub { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #d7e2ea; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #aebfca; }
      .chip { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dce9f0; }
      .code { font: 600 14px "SFMono-Regular", Consolas, monospace; fill: #e7f4fa; }
      .panel { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.12); stroke-width: 1.2; rx: 18; }
      .card { stroke: rgba(255,255,255,0.14); stroke-width: 1.2; rx: 16; filter: url(#shadow); }
      .client { fill: url(#client); }
      .server { fill: url(#server); }
      .brain { fill: url(#brain); }
      .data { fill: url(#data); }
      .external { fill: #1f2937; stroke: rgba(255,255,255,0.16); stroke-width: 1.2; rx: 16; filter: url(#shadow); }
      .line { fill: none; stroke: #9fb7c7; stroke-width: 2.3; marker-end: url(#arrow); opacity: 0.86; }
      .line-hot { fill: none; stroke: #f7c46c; stroke-width: 3; marker-end: url(#arrowHot); opacity: 0.95; }
      .line-soft { fill: none; stroke: #7dd3fc; stroke-width: 2; marker-end: url(#arrow); opacity: 0.56; stroke-dasharray: 8 8; }
      .chip-bg { fill: rgba(255,255,255,0.095); stroke: rgba(255,255,255,0.12); stroke-width: 1; rx: 12; }
      .note { fill: rgba(6,12,20,0.46); stroke: rgba(255,255,255,0.12); stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect class="page" width="1680" height="1120"/>
  <circle cx="1460" cy="150" r="230" fill="#1d4ed8" opacity="0.09"/>
  <circle cx="260" cy="1000" r="260" fill="#0f766e" opacity="0.10"/>

  <text x="84" y="88" class="title">Sonora AI Radio 架构图</text>
  <text x="84" y="124" class="subtitle">基于当前代码：Node.js 本地服务 + PWA 前端 + OpenAI 兼容 Agent + 网易云音乐 + TTS 缓存</text>

  <rect x="60" y="165" width="1560" height="145" class="panel"/>
  <text x="84" y="204" class="layer-title">1. 交互层 / Browser PWA</text>
  <rect x="90" y="225" width="320" height="58" class="card client"/>
  <text x="112" y="251" class="box-title">public/index.html</text>
  <text x="112" y="273" class="box-sub">Radio console / settings drawer</text>
  <rect x="440" y="225" width="320" height="58" class="card client"/>
  <text x="462" y="251" class="box-title">public/app.js</text>
  <text x="462" y="273" class="box-sub">Audio, chat, progress, NCM login UI</text>
  <rect x="790" y="225" width="250" height="58" class="card client"/>
  <text x="812" y="251" class="box-title">public/sw.js</text>
  <text x="812" y="273" class="box-sub">PWA service worker</text>
  <rect x="1070" y="225" width="300" height="58" class="card client"/>
  <text x="1092" y="251" class="box-title">Browser Audio APIs</text>
  <text x="1092" y="273" class="box-sub">audio tag, hostAudio, speechSynthesis</text>
  <rect x="1400" y="225" width="170" height="58" class="card client"/>
  <text x="1422" y="251" class="box-title">Assets</text>
  <text x="1422" y="273" class="box-sub">CSS, manifest, cover art</text>

  <rect x="60" y="362" width="1560" height="210" class="panel"/>
  <text x="84" y="401" class="layer-title">2. Node HTTP 编排层 / server/main.js</text>
  <rect x="90" y="426" width="250" height="92" class="card server"/>
  <text x="112" y="454" class="box-title">HTTP server</text>
  <text x="112" y="477" class="code">server/main.js</text>
  <text x="112" y="500" class="box-sub">listen 127.0.0.1:PORT</text>
  <rect x="382" y="426" width="260" height="92" class="card server"/>
  <text x="404" y="454" class="box-title">createHandler</text>
  <text x="404" y="477" class="code">server/http.js</text>
  <text x="404" y="500" class="box-sub">REST, static files, TTS files</text>
  <rect x="684" y="426" width="250" height="92" class="card server"/>
  <text x="706" y="454" class="box-title">WebSocketHub</text>
  <text x="706" y="477" class="code">server/ws.js</text>
  <text x="706" y="500" class="box-sub">/stream realtime events</text>
  <rect x="976" y="426" width="250" height="92" class="card server"/>
  <text x="998" y="454" class="box-title">Radio runtime</text>
  <text x="998" y="477" class="box-sub">ensureRadio / runShow</text>
  <text x="998" y="500" class="box-sub">next / previous / refill</text>
  <rect x="1268" y="426" width="250" height="92" class="card server"/>
  <text x="1290" y="454" class="box-title">Audio proxy</text>
  <text x="1290" y="477" class="box-sub">/api/player/audio</text>
  <text x="1290" y="500" class="box-sub">range-aware upstream stream</text>

  <rect x="90" y="531" width="260" height="24" class="chip-bg"/>
  <text x="108" y="548" class="chip">REST: /api/now /api/chat /api/player/* /api/ncm/* /api/taste</text>
  <rect x="382" y="531" width="320" height="24" class="chip-bg"/>
  <text x="400" y="548" class="chip">WS events: host-speaking, now-playing, queue-updated, track-ended</text>
  <rect x="736" y="531" width="262" height="24" class="chip-bg"/>
  <text x="754" y="548" class="chip">Startup calls ensureRadio({ trigger: "startup" })</text>

  <rect x="60" y="624" width="1560" height="300" class="panel"/>
  <text x="84" y="663" class="layer-title">3. 智能大脑、适配器和本地状态</text>
  <rect x="90" y="692" width="250" height="92" class="card brain"/>
  <text x="112" y="720" class="box-title">Intent Router</text>
  <text x="112" y="743" class="code">server/router.js</text>
  <text x="112" y="766" class="box-sub">control / music / agent</text>
  <rect x="382" y="692" width="250" height="92" class="card brain"/>
  <text x="404" y="720" class="box-title">ContextBuilder</text>
  <text x="404" y="743" class="code">server/context.js</text>
  <text x="404" y="766" class="box-sub">prompt + taste + env + memory</text>
  <rect x="674" y="692" width="250" height="92" class="card brain"/>
  <text x="696" y="720" class="box-title">AgentBrain</text>
  <text x="696" y="743" class="code">server/agent.js</text>
  <text x="696" y="766" class="box-sub">candidate pool + LLM JSON</text>
  <rect x="966" y="692" width="250" height="92" class="card brain"/>
  <text x="988" y="720" class="box-title">TtsPipeline</text>
  <text x="988" y="743" class="code">server/tts.js</text>
  <text x="988" y="766" class="box-sub">Step / Fish / browser fallback</text>
  <rect x="1258" y="692" width="250" height="92" class="card brain"/>
  <text x="1280" y="720" class="box-title">Scheduler</text>
  <text x="1280" y="743" class="code">server/scheduler.js</text>
  <text x="1280" y="766" class="box-sub">daily plan + hourly mood</text>

  <rect x="90" y="816" width="250" height="74" class="card data"/>
  <text x="112" y="844" class="box-title">StateStore</text>
  <text x="112" y="866" class="box-sub">state.db: now, queue, plays</text>
  <rect x="382" y="816" width="250" height="74" class="card data"/>
  <text x="404" y="844" class="box-title">User taste files</text>
  <text x="404" y="866" class="box-sub">user/users/&lt;uid&gt;/*.json, *.md</text>
  <rect x="674" y="816" width="250" height="74" class="card data"/>
  <text x="696" y="844" class="box-title">Prompts</text>
  <text x="696" y="866" class="box-sub">prompts/dj-persona.md</text>
  <rect x="966" y="816" width="250" height="74" class="card data"/>
  <text x="988" y="844" class="box-title">TTS cache</text>
  <text x="988" y="866" class="box-sub">cache/tts/*.mp3 served as /tts/*</text>
  <rect x="1258" y="816" width="250" height="74" class="card data"/>
  <text x="1280" y="844" class="box-title">Adapters</text>
  <text x="1280" y="866" class="box-sub">ncm, weather, calendar, upnp</text>

  <rect x="60" y="974" width="1560" height="96" class="panel"/>
  <text x="84" y="1013" class="layer-title">4. 外部服务 / Optional integrations</text>
  <rect x="90" y="1030" width="310" height="54" class="external"/>
  <text x="112" y="1055" class="box-title">Netease Cloud Music API</text>
  <text x="112" y="1075" class="box-sub">QR login, playlists, search, song URL, lyrics</text>
  <rect x="440" y="1030" width="280" height="54" class="external"/>
  <text x="462" y="1055" class="box-title">OpenAI-compatible LLM</text>
  <text x="462" y="1075" class="box-sub">chat/completions JSON decisions</text>
  <rect x="760" y="1030" width="270" height="54" class="external"/>
  <text x="782" y="1055" class="box-title">StepFun / Fish TTS</text>
  <text x="782" y="1075" class="box-sub">speech MP3 generation</text>
  <rect x="1070" y="1030" width="220" height="54" class="external"/>
  <text x="1092" y="1055" class="box-title">Weather / Calendar</text>
  <text x="1092" y="1075" class="box-sub">current stub context</text>
  <rect x="1330" y="1030" width="220" height="54" class="external"/>
  <text x="1352" y="1055" class="box-title">UPnP device</text>
  <text x="1352" y="1075" class="box-sub">local-browser placeholder</text>

  <path class="line-hot" d="M 600 285 C 600 344, 512 360, 512 422"/>
  <text x="625" y="354" class="small">fetch REST</text>
  <path class="line" d="M 915 285 C 915 352, 812 356, 812 422"/>
  <text x="934" y="354" class="small">WS /stream</text>
  <path class="line" d="M 1130 285 C 1184 342, 1392 358, 1392 422"/>
  <text x="1194" y="354" class="small">audio src</text>

  <path class="line-hot" d="M 642 472 L 680 472"/>
  <path class="line" d="M 934 472 L 970 472"/>
  <path class="line" d="M 1226 472 L 1262 472"/>
  <path class="line-soft" d="M 1060 518 C 1035 594, 794 617, 794 688"/>

  <path class="line-hot" d="M 1100 518 C 1100 622, 798 630, 798 688"/>
  <text x="908" y="612" class="small">build queue</text>
  <path class="line" d="M 798 784 C 798 802, 798 802, 798 812"/>
  <path class="line" d="M 632 738 L 668 738"/>
  <path class="line" d="M 924 738 L 960 738"/>
  <path class="line" d="M 1216 738 L 1252 738"/>
  <path class="line-soft" d="M 506 784 C 506 808, 506 808, 506 812"/>
  <path class="line-soft" d="M 214 784 C 214 808, 214 808, 214 812"/>
  <path class="line-soft" d="M 1092 784 C 1092 808, 1092 808, 1092 812"/>

  <path class="line" d="M 1384 890 C 1384 948, 245 955, 245 1026"/>
  <path class="line" d="M 798 692 C 730 620, 574 1006, 574 1026"/>
  <path class="line" d="M 1092 890 C 1092 956, 895 968, 895 1026"/>
  <path class="line-soft" d="M 1384 890 C 1384 946, 1180 966, 1180 1026"/>
  <path class="line-soft" d="M 1384 890 C 1440 948, 1440 972, 1440 1026"/>

  <rect x="1040" y="588" width="455" height="48" class="note"/>
  <text x="1060" y="608" class="small">核心运行流：</text>
  <text x="1060" y="628" class="small">chat/play/open -> routeIntent -> ContextBuilder -> AgentBrain -> hydrate tracks -> TTS -> StateStore -> WS broadcast</text>
</svg>
