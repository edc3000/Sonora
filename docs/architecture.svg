<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Sonora Pixel Hardware Architecture</title>
  <desc id="desc">Sonora current architecture diagram showing browser PWA, HTTP and WebSocket backplane, ChatAgent tool loop, radio runtime, recommendation pipeline, media pipeline, local data, and external services.</desc>
  <defs>
    <pattern id="pixelGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#241e18" stroke-width="1"/>
      <rect x="0" y="0" width="2" height="2" fill="#3a3025"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.035"/>
    </pattern>
    <filter id="hardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#c19a6b" flood-opacity="0.32"/>
    </filter>
    <filter id="amberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b98256" flood-opacity="0.34"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0H10V10H0L6 5Z" fill="#c19a6b"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0H10V10H0L6 5Z" fill="#b98256"/>
    </marker>
    <style>
      .bg { fill: #100d0a; }
      .grid { fill: url(#pixelGrid); opacity: 0.85; }
      .scan { fill: url(#scanlines); opacity: 0.7; }
      .frame { fill: none; stroke: #b89466; stroke-width: 4; shape-rendering: crispEdges; }
      .frame2 { fill: none; stroke: #594637; stroke-width: 2; shape-rendering: crispEdges; }
      .title { fill: #ead9bd; font: 900 36px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; filter: url(#hardGlow); }
      .subtitle { fill: #b59b7d; font: 700 16px "SFMono-Regular", Menlo, Consolas, monospace; }
      .stamp { fill: #19120d; stroke: #a9815e; stroke-width: 2; shape-rendering: crispEdges; }
      .stampText { fill: #d8b78f; font: 900 14px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .bay { fill: #15110d; stroke: #705640; stroke-width: 2; shape-rendering: crispEdges; }
      .bayLabel { fill: #d0ae82; font: 900 17px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .bayHint { fill: #9c8973; font: 700 12px "SFMono-Regular", Menlo, Consolas, monospace; }
      .chip { fill: #17130f; stroke: #9f7e5b; stroke-width: 2; shape-rendering: crispEdges; }
      .chipAmber { fill: #1d1510; stroke: #b98256; stroke-width: 2; shape-rendering: crispEdges; }
      .chipCyan { fill: #151412; stroke: #91806b; stroke-width: 2; shape-rendering: crispEdges; }
      .chipMagenta { fill: #1a1210; stroke: #a36f5c; stroke-width: 2; shape-rendering: crispEdges; }
      .chipData { fill: #17150f; stroke: #a99a70; stroke-width: 2; shape-rendering: crispEdges; }
      .pin { fill: #c19a6b; }
      .pinAmber { fill: #b98256; }
      .pinCyan { fill: #91806b; }
      .kicker { fill: #c5a57a; font: 900 11px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .kickerAmber { fill: #d0a06f; font: 900 11px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .kickerCyan { fill: #b7a78e; font: 900 11px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .cardTitle { fill: #f0debf; font: 900 19px "SFMono-Regular", Menlo, Consolas, monospace; }
      .cardTitleSmall { fill: #f0debf; font: 900 16px "SFMono-Regular", Menlo, Consolas, monospace; }
      .body { fill: #c9b9a0; font: 700 13px "SFMono-Regular", Menlo, Consolas, monospace; }
      .bodyDim { fill: #a49179; font: 700 12px "SFMono-Regular", Menlo, Consolas, monospace; }
      .code { fill: #d8c08e; font: 800 12px "SFMono-Regular", Menlo, Consolas, monospace; }
      .tiny { fill: #97856f; font: 700 10px "SFMono-Regular", Menlo, Consolas, monospace; }
      .trace { fill: none; stroke: #c19a6b; stroke-width: 3; marker-end: url(#arrowGreen); shape-rendering: crispEdges; }
      .traceAmber { fill: none; stroke: #b98256; stroke-width: 3; marker-end: url(#arrowAmber); shape-rendering: crispEdges; }
      .traceSoft { fill: none; stroke: #80654b; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#arrowGreen); shape-rendering: crispEdges; }
      .bus { fill: #15100c; stroke: #b89466; stroke-width: 3; shape-rendering: crispEdges; filter: url(#hardGlow); }
      .busText { fill: #ead9bd; font: 900 18px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
      .port { fill: #18120d; stroke: #6a5544; stroke-width: 1.5; shape-rendering: crispEdges; }
      .portText { fill: #d0bea2; font: 800 11px "SFMono-Regular", Menlo, Consolas, monospace; }
      .legend { fill: #15110d; stroke: #5e4c3c; stroke-width: 1.5; shape-rendering: crispEdges; }
      .legendText { fill: #c8b69c; font: 800 12px "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="980"/>
  <rect class="grid" width="1400" height="980"/>
  <rect class="scan" width="1400" height="980"/>
  <rect x="24" y="24" width="1352" height="932" class="frame"/>
  <rect x="38" y="38" width="1324" height="904" class="frame2"/>

  <text x="64" y="82" class="title">SONORA / LOCAL AI RADIO BOARD</text>
  <text x="66" y="112" class="subtitle">current code map: PWA console - Node backplane - ChatAgent tools - radio/media/data buses</text>
  <rect x="1038" y="58" width="268" height="34" class="stamp"/>
  <text x="1055" y="80" class="stampText">PIXEL HARDWARE REV.2026-05-18</text>

  <!-- left: browser console -->
  <rect x="64" y="150" width="328" height="650" class="bay"/>
  <text x="84" y="180" class="bayLabel">BROWSER PWA CONSOLE</text>
  <text x="84" y="202" class="bayHint">public/index.html + app.js</text>
  <text x="84" y="219" class="bayHint">styles.css + sw.js</text>

  <rect x="92" y="236" width="272" height="94" class="chipCyan"/>
  <rect x="92" y="236" width="8" height="94" class="pinCyan"/>
  <text x="114" y="263" class="kickerCyan">UI SURFACE</text>
  <text x="114" y="289" class="cardTitleSmall">Now / Host / Queue</text>
  <text x="114" y="314" class="body">panels, progress, lyrics</text>

  <rect x="92" y="360" width="272" height="112" class="chipCyan"/>
  <rect x="92" y="360" width="8" height="112" class="pinCyan"/>
  <text x="114" y="387" class="kickerCyan">CHAT DOCK</text>
  <text x="114" y="413" class="cardTitleSmall">Ask Sonora</text>
  <text x="114" y="438" class="body">POST /api/chat</text>
  <text x="114" y="458" class="bodyDim">renders replies + action state</text>

  <rect x="92" y="502" width="272" height="112" class="chipCyan"/>
  <rect x="92" y="502" width="8" height="112" class="pinCyan"/>
  <text x="114" y="529" class="kickerCyan">SETTINGS + NCM</text>
  <text x="114" y="555" class="cardTitleSmall">Keys / Login / Sync</text>
  <text x="114" y="580" class="body">settings drawer + QR modal</text>
  <text x="114" y="600" class="bodyDim">/api/settings /api/ncm/*</text>

  <rect x="92" y="644" width="272" height="112" class="chipCyan"/>
  <rect x="92" y="644" width="8" height="112" class="pinCyan"/>
  <text x="114" y="671" class="kickerCyan">DUAL AUDIO ENGINE</text>
  <text x="114" y="697" class="cardTitleSmall">hostAudio + trackAudio</text>
  <text x="114" y="722" class="body">intro, overlap, seek, recovery</text>
  <text x="114" y="742" class="bodyDim">/tts/* + /api/player/audio</text>

  <!-- middle: transport bus -->
  <rect x="444" y="174" width="512" height="72" class="bus"/>
  <text x="478" y="205" class="busText">HTTP + WEBSOCKET BACKPLANE</text>
  <text x="478" y="228" class="body">REST + static PWA + audio proxy + WS state</text>
  <rect x="468" y="262" width="116" height="28" class="port"/><text x="483" y="281" class="portText">/api/chat</text>
  <rect x="598" y="262" width="140" height="28" class="port"/><text x="613" y="281" class="portText">/api/player/*</text>
  <rect x="752" y="262" width="132" height="28" class="port"/><text x="767" y="281" class="portText">/stream WS</text>

  <path class="trace" d="M364 416H444"/>
  <path class="trace" d="M364 700H444"/>
  <path class="traceSoft" d="M364 558H424V276H468"/>
  <path class="traceSoft" d="M752 262V216"/>

  <!-- runtime bay -->
  <rect x="444" y="328" width="512" height="472" class="bay"/>
  <text x="464" y="358" class="bayLabel">NODE LOCAL RUNTIME</text>
  <text x="464" y="380" class="bayHint">server/main.js wires modules, state, queue, broadcasts</text>

  <rect x="472" y="416" width="190" height="116" class="chipAmber"/>
  <rect x="472" y="416" width="190" height="8" class="pinAmber"/>
  <text x="492" y="446" class="kickerAmber">CHAT AGENT</text>
  <text x="492" y="472" class="cardTitleSmall">tool-calling loop</text>
  <text x="492" y="497" class="body">search + enqueue</text>
  <text x="492" y="517" class="bodyDim">replace / next / pause</text>

  <rect x="706" y="416" width="220" height="116" class="chip"/>
  <rect x="706" y="416" width="220" height="8" class="pin"/>
  <text x="726" y="446" class="kicker">RADIO RUNTIME</text>
  <text x="726" y="472" class="cardTitleSmall">queue state machine</text>
  <text x="726" y="497" class="body">ensureRadio / runShow</text>
  <text x="726" y="517" class="bodyDim">refill / next / warm TTS</text>

  <rect x="472" y="566" width="190" height="116" class="chip"/>
  <rect x="472" y="566" width="190" height="8" class="pin"/>
  <text x="492" y="596" class="kicker">CONTEXT BUILDER</text>
  <text x="492" y="622" class="cardTitleSmall">prompt packet</text>
  <text x="492" y="647" class="body">persona + taste + env</text>
  <text x="492" y="667" class="bodyDim">weather / calendar</text>

  <rect x="706" y="566" width="220" height="116" class="chip"/>
  <rect x="706" y="566" width="220" height="8" class="pin"/>
  <text x="726" y="596" class="kicker">AGENT BRAIN</text>
  <text x="726" y="622" class="cardTitleSmall">candidate pool</text>
  <text x="726" y="647" class="body">similar songs, artist top</text>
  <text x="726" y="667" class="bodyDim">tier sample + JSON</text>

  <rect x="472" y="716" width="190" height="54" class="chipMagenta"/>
  <text x="492" y="750" class="cardTitleSmall">Intro selector</text>
  <text x="492" y="766" class="tiny">story + language aware</text>

  <rect x="706" y="716" width="220" height="54" class="chipMagenta"/>
  <text x="726" y="750" class="cardTitleSmall">StateStore + Hub</text>
  <text x="726" y="766" class="tiny">state.db writes + broadcasts</text>

  <path class="traceAmber" d="M584 290V416"/>
  <path class="trace" d="M662 474H706"/>
  <path class="trace" d="M567 532V566"/>
  <path class="trace" d="M662 624H706"/>
  <path class="trace" d="M816 682V716"/>
  <path class="traceAmber" d="M662 743H706"/>
  <path class="traceSoft" d="M816 532V566"/>
  <path class="traceSoft" d="M816 416V290"/>

  <!-- right: services and storage -->
  <rect x="1008" y="150" width="328" height="650" class="bay"/>
  <text x="1028" y="180" class="bayLabel">SERVICE + DATA EDGE</text>
  <text x="1028" y="202" class="bayHint">external APIs + local JSON</text>
  <text x="1028" y="219" class="bayHint">cache + user taste files</text>

  <rect x="1036" y="236" width="272" height="86" class="chipAmber"/>
  <rect x="1300" y="236" width="8" height="86" class="pinAmber"/>
  <text x="1058" y="263" class="kickerAmber">OPENAI COMPATIBLE</text>
  <text x="1058" y="289" class="cardTitleSmall">LLM decision layer</text>
  <text x="1058" y="310" class="bodyDim">ChatAgent tools + AgentBrain JSON</text>

  <rect x="1036" y="352" width="272" height="100" class="chip"/>
  <rect x="1300" y="352" width="8" height="100" class="pin"/>
  <text x="1058" y="379" class="kicker">NETEASE CLOUD MUSIC</text>
  <text x="1058" y="405" class="cardTitleSmall">music adapter</text>
  <text x="1058" y="430" class="body">login, search, recommend, URL</text>

  <rect x="1036" y="482" width="272" height="100" class="chipMagenta"/>
  <rect x="1300" y="482" width="8" height="100" class="pinAmber"/>
  <text x="1058" y="509" class="kickerAmber">STEP / FISH TTS</text>
  <text x="1058" y="535" class="cardTitleSmall">host voice synthesis</text>
  <text x="1058" y="560" class="body">cache/tts/*.mp3</text>

  <rect x="1036" y="612" width="272" height="92" class="chipData"/>
  <rect x="1300" y="612" width="8" height="92" class="pin"/>
  <text x="1058" y="639" class="kicker">LOCAL DATA BUS</text>
  <text x="1058" y="665" class="cardTitleSmall">state.db + user/*</text>
  <text x="1058" y="686" class="bodyDim">taste, likelist, sessions</text>

  <rect x="1036" y="734" width="272" height="52" class="chipData"/>
  <text x="1058" y="767" class="cardTitleSmall">Weather / Calendar / UPnP</text>
  <text x="1058" y="783" class="tiny">context + device control</text>

  <path class="traceAmber" d="M926 474H1036"/>
  <path class="trace" d="M926 624H1036"/>
  <path class="traceAmber" d="M926 743H988V532H1036"/>
  <path class="trace" d="M926 743H988V658H1036"/>
  <path class="traceSoft" d="M884 276H988V402H1036"/>
  <path class="traceSoft" d="M884 276H988V760H1036"/>

  <!-- bottom: main flow strip -->
  <rect x="64" y="842" width="1272" height="74" class="legend"/>
  <text x="88" y="870" class="legendText">MAIN SIGNAL PATH</text>
  <text x="88" y="892" class="body">user chat/play/open -> REST API -> ChatAgent tools or Radio Runtime -> ContextBuilder -> AgentBrain</text>
  <text x="88" y="912" class="body">candidate pool -> NCM hydrate -> Intro selector -> TTS cache -> StateStore -> WS broadcast -> PWA audio/UI</text>

  <rect x="64" y="924" width="344" height="18" fill="#a8835e"/>
  <rect x="424" y="924" width="256" height="18" fill="#91806b"/>
  <rect x="696" y="924" width="248" height="18" fill="#b98256"/>
  <rect x="960" y="924" width="376" height="18" fill="#a99a70"/>
  <text x="74" y="938" class="tiny" fill="#100d0a">control + state</text>
  <text x="434" y="938" class="tiny" fill="#100d0a">browser surface</text>
  <text x="706" y="938" class="tiny" fill="#100d0a">LLM/tool decisions</text>
  <text x="970" y="938" class="tiny" fill="#100d0a">data/media/services</text>
</svg>
