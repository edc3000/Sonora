<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1680" viewBox="0 0 1080 1680" role="img" aria-labelledby="title desc">
  <title id="title">Sonora 项目架构图</title>
  <desc id="desc">按前端交互、API 连接交互、后端编排、后端模块、外部服务与本地数据分层绘制的 Sonora 项目架构图。</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="72%">
      <stop offset="0" stop-color="#1f2937" stop-opacity="0.78"/>
      <stop offset="0.5" stop-color="#0f172a" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13182e"/>
      <stop offset="1" stop-color="#241b3f"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101d2c"/>
      <stop offset="1" stop-color="#0b3340"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#251407"/>
      <stop offset="1" stop-color="#3a2110"/>
    </linearGradient>
    <linearGradient id="module" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1618"/>
      <stop offset="1" stop-color="#0d2a24"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#182217"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.85"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#697180"/>
    </marker>
    <style>
      .bg { fill: #000; }
      .title { fill: #f4f4f5; font: 700 43px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; filter: url(#textShadow); }
      .subtitle { fill: #a7a7ad; font: 600 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .badge { fill: #251d0b; stroke: #70551f; stroke-width: 2; rx: 12; }
      .badgeText { fill: #ddbe7d; font: 800 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .layerName { fill: #737781; font: 800 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .layerHint { fill: #5e626b; font: 700 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .panel { fill: rgba(255,255,255,0.025); stroke: rgba(255,255,255,0.07); stroke-width: 1.2; rx: 14; }
      .card { stroke-width: 2.1; rx: 10; filter: url(#shadow); }
      .front { fill: url(#front); stroke: #3a3e72; }
      .api { fill: url(#api); stroke: #225370; }
      .core { fill: url(#core); stroke: #75451d; }
      .module { fill: url(#module); stroke: #24705a; }
      .data { fill: url(#data); stroke: #46513c; }
      .kicker { fill: #7284a6; font: 800 14px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1.5px; }
      .kicker2 { fill: #c78a58; font: 800 14px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1.5px; }
      .kicker3 { fill: #7dd3ad; font: 800 14px "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1.5px; }
      .cardTitle { fill: #e5edf7; font: 800 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .cardTitle2 { fill: #f1b17a; font: 800 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .cardTitle3 { fill: #a5f3cf; font: 800 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .body { fill: #b8c0cc; font: 600 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .bodyDim { fill: #8d98a7; font: 600 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .code { fill: #aeb8c5; font: 700 15px "SFMono-Regular", Menlo, Consolas, monospace; }
      .tag { fill: #111720; stroke: #3b4656; stroke-width: 1; rx: 4; }
      .tagText { fill: #aeb8c5; font: 700 13px "SFMono-Regular", Menlo, Consolas, monospace; }
      .flow { fill: none; stroke: #697180; stroke-width: 2.5; marker-end: url(#arrow); opacity: 0.82; }
      .flowSoft { fill: none; stroke: #4e5663; stroke-width: 2; marker-end: url(#arrow); opacity: 0.58; stroke-dasharray: 7 7; }
      .note { fill: #050806; stroke: #253128; stroke-width: 1.4; rx: 8; }
      .noteText { fill: #c1c7cf; font: 700 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1680"/>
  <rect width="1080" height="620" fill="url(#glow)"/>

  <text x="333" y="86" class="title">Sonora 项目架构图</text>
  <text x="283" y="124" class="subtitle">从用户交互到后端推荐、取歌、播报、状态同步的真实代码分层</text>
  <rect x="229" y="153" width="622" height="45" class="badge"/>
  <text x="257" y="182" class="badgeText">个人 AI 电台 · PWA 前端 · Node 本地服务 · 网易云音乐 · AI 主持人</text>

  <!-- 第一层：前端交互 -->
  <rect x="108" y="240" width="880" height="212" class="panel"/>
  <text x="48" y="312" class="layerName">第一层</text>
  <text x="31" y="340" class="layerHint">前端交互</text>

  <rect x="136" y="270" width="260" height="132" class="card front"/>
  <text x="154" y="296" class="kicker">PUBLIC / APP</text>
  <text x="154" y="326" class="cardTitle">电台主界面</text>
  <text x="154" y="354" class="body">播放器、队列、主持稿、进度条</text>
  <text x="154" y="380" class="code">index.html / app.js</text>

  <rect x="416" y="270" width="260" height="132" class="card front"/>
  <text x="434" y="296" class="kicker">USER ACTION</text>
  <text x="434" y="326" class="cardTitle">用户操作</text>
  <text x="434" y="354" class="body">聊天点歌、播放暂停、上一首下一首</text>
  <text x="434" y="380" class="code">chat / player controls</text>

  <rect x="696" y="270" width="260" height="132" class="card front"/>
  <text x="714" y="296" class="kicker">SETTINGS</text>
  <text x="714" y="326" class="cardTitle">设置和账号</text>
  <text x="714" y="354" class="body">网易云登录、同步歌单、编辑偏好</text>
  <text x="714" y="380" class="code">profile / settings / sw.js</text>

  <path class="flow" d="M548 452 L548 515"/>

  <!-- 第二层：API连接交互 -->
  <rect x="108" y="520" width="880" height="248" class="panel"/>
  <text x="48" y="604" class="layerName">第二层</text>
  <text x="17" y="632" class="layerHint">API 连接</text>

  <rect x="136" y="550" width="260" height="156" class="card api"/>
  <text x="154" y="576" class="kicker">HTTP API</text>
  <text x="154" y="606" class="cardTitle">状态和业务接口</text>
  <text x="154" y="633" class="code">GET /api/now</text>
  <text x="154" y="657" class="code">POST /api/chat</text>
  <text x="154" y="681" class="code">POST /api/radio/ensure</text>

  <rect x="416" y="550" width="260" height="156" class="card api"/>
  <text x="434" y="576" class="kicker">PLAYER / AUDIO</text>
  <text x="434" y="606" class="cardTitle">播放和音频连接</text>
  <text x="434" y="633" class="code">POST /api/player/*</text>
  <text x="434" y="657" class="code">GET /api/player/audio</text>
  <text x="434" y="681" class="code">GET /tts/&lt;hash&gt;.mp3</text>

  <rect x="696" y="550" width="260" height="156" class="card api"/>
  <text x="714" y="576" class="kicker">PROFILE / LIVE</text>
  <text x="714" y="606" class="cardTitle">资料和实时事件</text>
  <text x="714" y="633" class="code">/api/ncm/* /api/taste</text>
  <text x="714" y="657" class="code">GET/POST /api/settings</text>
  <text x="714" y="681" class="code">WS /stream</text>

  <rect x="136" y="722" width="820" height="26" rx="6" fill="#061016" stroke="#213445" stroke-width="1"/>
  <text x="154" y="741" class="noteText">这一层由 server/http.js 暴露：REST 负责命令和数据，WebSocket 负责 now-playing / queue-updated / host-speaking 推送。</text>

  <path class="flow" d="M548 768 L548 832"/>

  <!-- 第三层：后端编排 -->
  <rect x="108" y="838" width="880" height="226" class="panel"/>
  <text x="48" y="916" class="layerName">第三层</text>
  <text x="17" y="944" class="layerHint">后端编排</text>

  <rect x="136" y="868" width="260" height="140" class="card core"/>
  <text x="154" y="894" class="kicker2">SERVER / MAIN</text>
  <text x="154" y="924" class="cardTitle2">服务入口</text>
  <text x="154" y="952" class="body">启动 HTTP、WS、Scheduler</text>
  <text x="154" y="978" class="code">node server/main.js</text>

  <rect x="416" y="868" width="260" height="140" class="card core"/>
  <text x="434" y="894" class="kicker2">RADIO RUNTIME</text>
  <text x="434" y="924" class="cardTitle2">电台运行循环</text>
  <text x="434" y="952" class="body">ensureRadio / runShow / refill</text>
  <text x="434" y="978" class="code">queue size: 5 + 1</text>

  <rect x="696" y="868" width="260" height="140" class="card core"/>
  <text x="714" y="894" class="kicker2">EVENT BUS</text>
  <text x="714" y="924" class="cardTitle2">状态落盘和广播</text>
  <text x="714" y="952" class="body">StateStore 更新后推送前端</text>
  <text x="714" y="978" class="code">state.update -> hub.broadcast</text>

  <path class="flow" d="M548 1064 L548 1128"/>

  <!-- 第四层：后端功能模块 -->
  <rect x="108" y="1134" width="880" height="316" class="panel"/>
  <text x="48" y="1248" class="layerName">第四层</text>
  <text x="17" y="1276" class="layerHint">后端模块</text>

  <rect x="136" y="1164" width="260" height="112" class="card module"/>
  <text x="154" y="1190" class="kicker3">ROUTER</text>
  <text x="154" y="1219" class="cardTitle3">意图分流</text>
  <text x="154" y="1246" class="body">控制指令、音乐请求、普通对话</text>

  <rect x="416" y="1164" width="260" height="112" class="card module"/>
  <text x="434" y="1190" class="kicker3">CONTEXT</text>
  <text x="434" y="1219" class="cardTitle3">上下文组装</text>
  <text x="434" y="1246" class="body">提示词、偏好、环境、历史记忆</text>

  <rect x="696" y="1164" width="260" height="112" class="card module"/>
  <text x="714" y="1190" class="kicker3">AGENT / RECOMMEND</text>
  <text x="714" y="1219" class="cardTitle3">推荐和选歌</text>
  <text x="714" y="1246" class="body">候选池评分、去重、LLM 决策兜底</text>

  <rect x="136" y="1294" width="260" height="112" class="card module"/>
  <text x="154" y="1320" class="kicker3">NCM ADAPTER</text>
  <text x="154" y="1349" class="cardTitle3">音乐服务适配</text>
  <text x="154" y="1376" class="body">搜索、推荐、相似歌、取播放链接</text>

  <rect x="416" y="1294" width="260" height="112" class="card module"/>
  <text x="434" y="1320" class="kicker3">TTS PIPELINE</text>
  <text x="434" y="1349" class="cardTitle3">主持人声音</text>
  <text x="434" y="1376" class="body">Step / Fish 合成，浏览器语音兜底</text>

  <rect x="696" y="1294" width="260" height="112" class="card module"/>
  <text x="714" y="1320" class="kicker3">TASTE / CONFIG</text>
  <text x="714" y="1349" class="cardTitle3">账号偏好和配置</text>
  <text x="714" y="1376" class="body">歌单同步、画像生成、运行时设置</text>

  <path class="flow" d="M548 1450 L548 1514"/>

  <!-- 第五层：外部服务和数据 -->
  <rect x="108" y="1520" width="880" height="116" class="panel"/>
  <text x="48" y="1564" class="layerName">第五层</text>
  <text x="17" y="1592" class="layerHint">数据/服务</text>

  <rect x="136" y="1545" width="182" height="64" class="card data"/>
  <text x="154" y="1570" class="cardTitle">本地数据</text>
  <text x="154" y="1596" class="code">state.db / user/*</text>
  <rect x="334" y="1545" width="182" height="64" class="card data"/>
  <text x="352" y="1570" class="cardTitle">配置密钥</text>
  <text x="352" y="1596" class="code">.env / settings</text>
  <rect x="532" y="1545" width="182" height="64" class="card data"/>
  <text x="550" y="1570" class="cardTitle">外部模型</text>
  <text x="550" y="1596" class="code">OpenAI API</text>
  <rect x="730" y="1545" width="226" height="64" class="card data"/>
  <text x="748" y="1570" class="cardTitle">音乐和语音服务</text>
  <text x="748" y="1596" class="code">NCM / Step / Fish</text>

  <!-- 跨层辅助线 -->
  <path class="flowSoft" d="M266 706 C266 805 266 822 266 868"/>
  <path class="flowSoft" d="M826 706 C826 816 826 1100 826 1164"/>
  <path class="flowSoft" d="M826 1406 C826 1465 843 1488 843 1545"/>
</svg>
